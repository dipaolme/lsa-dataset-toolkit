paths:
  raw: data/raw
  videos: /mnt/c/Users/mdp_e/Gobierno de la Ciudad de Buenos Aires/grupo_DG Inclusión Digital - Documents/02-Proyectos/08-Avatar AI/Material LSA/GUÍA INFO LSA 2018-2019/videos
  subs_docx: data/raw/GUÍA INFO LSA 2018-2019/Guia Subs.docx
  subtitles: data/subtitles
  keypoints: data/keypoints
  dataset: data/dataset
  catalog: data/catalog

channel:
  url: ""  # completar con la URL del canal antes de correr

catalog:
  path: data/catalog

ocr:
  sample_frames: 5
  sample_times_sec: [5, 10, 30, 60, 90]
  bottom_fraction: 0.35
  text_threshold: 3        # mínimo de frames con texto → "hardcoded"

download:
  format: "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]"
  subtitle_langs: ["es", "es-419"]
  write_auto_subs: true

mediapipe:
  model_complexity: 1        # 0=lite, 1=full, 2=heavy
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  static_image_mode: false

dataset:
  sample_rate: 1             # procesar 1 de cada N frames
  output_format: "json"      # json o csv
